<script>
(function updateSiteRuntime() {
  var startTime = new Date('2022-01-01T00:00:00+08:00').getTime();
  var runtimeElement = document.getElementById('site-runtime');

  if (!runtimeElement) {
    return;
  }

  function pad(value) {
    return value < 10 ? '0' + value : String(value);
  }

  function render() {
    var seconds = Math.max(Math.floor((Date.now() - startTime) / 1000), 0);
    var totalDays = Math.floor(seconds / 86400);
    var years = Math.floor(totalDays / 365);
    var days = totalDays % 365;
    var hours = Math.floor((seconds % 86400) / 3600);
    var minutes = Math.floor((seconds % 3600) / 60);
    var restSeconds = seconds % 60;

    runtimeElement.textContent = years + ' 年 ' + days + ' 天 ' + pad(hours) + ' 时 ' + pad(minutes) + ' 分 ' + pad(restSeconds) + ' 秒';
  }

  render();
  window.setInterval(render, 1000);
})();
</script>
